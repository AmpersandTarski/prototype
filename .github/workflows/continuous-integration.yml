name: CI
on:
  pull_request:

env:
  DOCKER_AMPERSAND_IMAGE: ampersandtarski/prototype-framework

jobs:
  regression-tests:
    name: Regression tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
    
    # Don't use GITHUB_REF in docker tag, because it can be an invalid tag format (e.g. a branch that starts with #)
    - name: Build
      run: docker build --tag ${DOCKER_AMPERSAND_IMAGE}:local .

    # Every case under test/regression/ is a build case: the Dockerfile here compiles the
    # case's script.adl and builds the frontend. A directory without a script.adl is not a
    # build case; it is reported and skipped instead of failing the compiler on a missing
    # file. Runtime specs live with their project (test/projects/<project>/e2e/).
    - name: Tests
      run: |
        cd test/regression
        for d in */ ; do
          if [ ! -f "${d}script.adl" ]; then
            echo "::warning::skipping ${d}: no script.adl, so it is not a build case"
            continue
          fi
          echo "building ${d}"
          docker buildx build --build-context test="$d" .
        done

  static-analyzer:
    name: PHP static analyzer
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        # extensions: # allows to install php extensions with PECL
        tools: phan:v5.4 # allows to install other tools, see: https://github.com/shivammathur/setup-php

    - name: Install dependencies
      run: composer install --prefer-dist --no-dev --profile --optimize-autoloader --no-scripts --ignore-platform-reqs

    - name: Run Phan
      run: |
        cd backend
        phan --version
        phan -p --color --config-file .phan/config.php
