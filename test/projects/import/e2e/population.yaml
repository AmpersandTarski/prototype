# Same population as population.json, written in YAML.
# YAML lets us add comments, drop quotes/commas and use block lists — features JSON lacks.
# The runtime importer must produce EXACTLY the same result as the JSON file.

atoms:
  - concept: Person
    atoms: [P1, P2]
  - concept: Organization
    atoms: [O1, O2]

links:
  # Every person has a name (name[Person*Name] is UNI,TOT)
  - relation: name[Person*Name]
    links:
      - { src: P1, tgt: John Doe }
      - { src: P2, tgt: Jane Smith }
  # Every organization has a name (orgName[Organization*Name] is UNI,TOT)
  - relation: orgName[Organization*Name]
    links:
      - { src: O1, tgt: Acme Corp }
      - { src: O2, tgt: Tech Solutions }
  # Who works where (worksFor[Person*Organization] is UNI)
  - relation: worksFor[Person*Organization]
    links:
      - { src: P1, tgt: O1 }
      - { src: P2, tgt: O2 }
