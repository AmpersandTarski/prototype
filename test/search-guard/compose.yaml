volumes:
  searchguard-db-data:

networks:
  searchguard:

services:
  prototype:
    container_name: searchguard-prototype
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: dev.Dockerfile
    depends_on:
      - prototype-db
    ports:
      - "9380:80"
    volumes:
      - ../..:/var/www
    networks:
      - searchguard
    environment:
      - AMPERSAND_DEBUG_MODE=true
      - AMPERSAND_DBHOST=searchguard-db
      - AMPERSAND_DBUSER=ampersand
      - AMPERSAND_DBPASS=ampersand
      - AMPERSAND_SERVER_URL=http://localhost:9380

  prototype-db:
    container_name: searchguard-db
    image: mariadb:10.6
    command: ["--lower-case-table-names=1", "--sql-mode=ANSI,TRADITIONAL"]
    environment:
      - MYSQL_ROOT_PASSWORD=ampersand
      - MYSQL_USER=ampersand
      - MYSQL_PASSWORD=ampersand
    volumes:
      - searchguard-db-data:/var/lib/mysql
      - ../../db-init-scripts:/docker-entrypoint-initdb.d
    networks:
      - searchguard
