# Isolated stack for the session garbage-collection tests (see README.md).
# Runs on port 9280 with its own containers/volumes, so it can run next to
# the regular dev stack (port 80) and other test projects.
volumes:
  sessgc-db-data:

networks:
  sessgc:

services:
  prototype:
    container_name: sessgc-prototype
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: dev.Dockerfile
    depends_on:
      - prototype-db
    ports:
      - "9280:80"
    volumes:
      - ../..:/var/www
    networks:
      - sessgc
    environment:
      - AMPERSAND_DEBUG_MODE=true
      - AMPERSAND_DBHOST=sessgc-db
      - AMPERSAND_DBUSER=ampersand
      - AMPERSAND_DBPASS=ampersand
      - AMPERSAND_SERVER_URL=http://localhost:9280

  prototype-db:
    container_name: sessgc-db
    image: mariadb:10.6
    command: ["--lower-case-table-names=1", "--sql-mode=ANSI,TRADITIONAL"]
    environment:
      - MYSQL_ROOT_PASSWORD=ampersand
      - MYSQL_USER=ampersand
      - MYSQL_PASSWORD=ampersand
    volumes:
      - sessgc-db-data:/var/lib/mysql
      - ../../db-init-scripts:/docker-entrypoint-initdb.d
    networks:
      - sessgc
