<div class="layout-topbar">
    <a class="layout-topbar-logo" routerLink="">
        <i class="pi pi-home"></i>
        <span>Prototype</span>
    </a>

    <button
        #menubutton
        class="p-link layout-menu-button layout-topbar-button"
        (click)="layoutService.onMenuToggle()"
    >
        <i class="pi pi-bars"></i>
    </button>

    <button
        #topbarmenubutton
        class="p-link layout-topbar-menu-button layout-topbar-button"
        (click)="layoutService.showProfileSidebar()"
    >
        <i class="pi pi-ellipsis-v"></i>
    </button>

    <div
        #topbarmenu
        class="layout-topbar-menu"
        [ngClass]="{
            'layout-topbar-menu-mobile-active': layoutService.state.profileSidebarVisible
        }"
    >
        <!-- Admin Mode Toggle -->
        <div style="display: flex; align-items: center; gap: 0.5rem; margin-right: 1rem;">
            <span style="font-size: 0.875rem; font-weight: 600; color: var(--text-color)">Admin</span>
            <p-inputSwitch [(ngModel)]="adminMode"></p-inputSwitch>
        </div>

        <!-- Signal violations badge -->
        <a
            *ngIf="signalViolationCount$ | async as violationCount"
            routerLink="/signals"
            class="p-link layout-topbar-button"
            pTooltip="Openstaande signalen"
            tooltipPosition="bottom"
            [class.hidden]="violationCount === 0"
            style="position: relative; display: inline-flex"
        >
            <i class="pi pi-exclamation-triangle" style="color: var(--yellow-500)"></i>
            <p-badge
                *ngIf="violationCount > 0"
                [value]="'' + violationCount"
                severity="warning"
            ></p-badge>
        </a>

        <!-- Role Menu -->
        <app-roles></app-roles>
    </div>
</div>
