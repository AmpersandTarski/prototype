<div class="transaction-bar" *ngIf="(active$ | async) as active">
  <span class="transaction-bar__label">
    <ng-container *ngIf="active.isDirty(); else clean"
      >Unsaved changes in {{ active.transactionLabel }}</ng-container
    >
    <ng-template #clean>Editing {{ active.transactionLabel }}</ng-template>
  </span>
  <span class="transaction-bar__spacer"></span>
  <button
    pButton
    type="button"
    label="Cancel"
    class="p-button-text p-button-secondary"
    (click)="cancel(active)"
  ></button>
  <!-- Wrapper carries the tooltip so it also fires while the button is disabled. -->
  <span
    [pTooltip]="violationTooltip(active)"
    [tooltipDisabled]="active.canSave()"
    [escape]="false"
    tooltipPosition="top"
  >
    <button
      pButton
      type="button"
      label="Save"
      [disabled]="!active.canSave()"
      (click)="save(active)"
    ></button>
  </span>
</div>
