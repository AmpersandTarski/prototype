<ng-container *ngIf="!hideBecauseEmpty()">
    <div class="box-title" *ngIf="title">{{ title }}</div>

    <div *ngIf="canCreate() && isEmpty()">
        <p-button [rounded]="true" size="small" (click)="createItem()">
            New {{ tgtResourceType }}
        </p-button>
    </div>

    <ng-container *ngFor="let item of filterNullish(data)">
        <div style="float: right" class="options">
            <!-- The `showNavMenu` annotation adds a navigation menu per record. -->
            <app-ifcs-dropdown
                *ngIf="showNavMenu"
                size="small"
                [resource]="item"
            ></app-ifcs-dropdown>
            <span
                *ngIf="canCreate()"
                class="pi pi-fw pi-plus"
                pTooltip="Add"
                tooltipPosition="left"
                style="color: green; cursor: pointer"
                (click)="createItem()"
            ></span>
            <span
                *ngIf="canUpdate()"
                class="pi pi-fw pi-minus"
                (click)="removeItem(item)"
                pTooltip="Remove"
                tooltipPosition="left"
                style="color: red; padding-bottom: 9px; cursor: pointer"
            ></span>
            <span
                *ngIf="canDelete()"
                class="pi pi-fw pi-trash"
                pTooltip="Delete"
                tooltipPosition="left"
                style="color: red; cursor: pointer"
                (click)="deleteItem(item)"
            ></span>
        </div>
        <p-tabView [scrollable]="true">
            <p-tabPanel *ngFor="let tab of visibleTabs(item)" header="{{ tab.label }}">
                <ng-container
                    *ngTemplateOutlet="tab.template || defaultTemplate; context: { $implicit: item }"
                >
                </ng-container>
            </p-tabPanel>
        </p-tabView>
    </ng-container>

    <p-dropdown
        *ngIf="
            canUpdate() && (dropdownMenuObjects$ | async) as dropdownMenuObjects;
            else defaultDropdownMenu
        "
        [options]="dropdownMenuObjects"
        [formControl]="newItemControl"
        optionLabel="_label_"
        [filter]="true"
        filterBy="_label_"
        [showClear]="false"
        [placeholder]="placeholder"
        (onChange)="addItem()"
    >
    </p-dropdown>

    <ng-template #defaultDropdownMenu>
        <p-dropdown
            *ngIf="canUpdate()"
            [options]="[]"
            [showClear]="false"
            [placeholder]="placeholder"
        >
        </p-dropdown>
    </ng-template>
</ng-container>

<ng-template #defaultTemplate let-item>
    <span>No template provided</span>
</ng-template>
