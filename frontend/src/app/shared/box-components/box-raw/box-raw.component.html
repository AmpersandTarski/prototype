<!-- filterNullish: a UNI expression without a value arrives as [null] (see Box-RAW.html) -->
<div *ngFor="let item of filterNullish(data)">
    <ng-container
        *ngTemplateOutlet="template || defaultTemplate; context: { $implicit: item }"
    ></ng-container>
</div>

<ng-template #defaultTemplate let-item>
    <span>No template provided</span>
</ng-template>
