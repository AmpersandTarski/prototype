<!-- UNI + canUpdate: tekstveld voor directe bewerking -->
<div *ngIf="canRead() && canUpdate() && isUni">
    <ng-container *ngTemplateOutlet="uniEdit"> </ng-container>
</div>

<!-- Alle andere leesbare gevallen: lijst met onafhankelijke C/U/D knoppen -->
<div *ngIf="canRead() && !(canUpdate() && isUni)">
    <ng-container *ngTemplateOutlet="list"> </ng-container>
</div>

<!-- Niet leesbaar -->
<div *ngIf="!canRead()">
    <span><i>Alphanumeric is not readable</i></span>
</div>

<!--
    Gedeeld minus-knop patroon.
    Context:
      $implicit  = index in data[] om te verwijderen
      canRemove  = boolean: mag de knop getoond worden (CRUD + isTot-logica al ingebakken)
-->
<ng-template #removeButton let-index let-canRemove="canRemove">
    <div
        *ngIf="canRemove"
        class="pi pi-fw pi-minus"
        [ngStyle]="{
            color: data[index] != null ? 'red' : 'grey',
            cursor: data[index] != null ? 'pointer' : 'default'
        }"
        (click)="data[index] != null && removeItem(index)"
        pTooltip="Remove"
        tooltipPosition="left"
    ></div>
</ng-template>

<!--
    Gedeeld prullenbak-knop patroon.
    Context:
      $implicit   = index in data[] om te verwijderen
      showDelete  = boolean: mag de knop getoond worden (CRUD + isTot-logica al ingebakken)
        UNI:      canDelete() && !(isTot && resource[propertyName])
                  → verborgen als isTot=true én er een waarde aanwezig is (net als atomic-object)
        Niet-UNI: canDelete() && (!isTot || data.length > 1)
                  → verborgen als isTot=true én dit het laatste item is
-->
<ng-template #deleteButton let-index let-showDelete="showDelete">
    <div
        *ngIf="showDelete"
        class="pi pi-fw pi-trash"
        (click)="delete(index)"
        pTooltip="Delete"
        tooltipPosition="left"
        style="color: red; cursor: pointer"
    ></div>
</ng-template>

<!-- UNI edit: tekstveld + optionele minus (U) en prullenbak (D) -->
<ng-template #uniEdit>
    <div style="display: flex; align-items: center; gap: 4px">
        <!-- U → minus: verborgen bij isTot (mag niet worden losgekoppeld) -->
        <ng-container
            *ngTemplateOutlet="
                removeButton;
                context: { $implicit: 0, canRemove: canUpdate() && !isTot }
            "
        >
        </ng-container>
        <!-- D → prullenbak: verborgen bij isTot als er een waarde aanwezig is -->
        <ng-container
            *ngTemplateOutlet="
                deleteButton;
                context: {
                    $implicit: 0,
                    showDelete: canDelete() && !(isTot && resource[propertyName])
                }
            "
        >
        </ng-container>
        <input
            type="text"
            [(ngModel)]="resource[propertyName]"
            [attr.list]="'opts-uni-' + propertyName"
            (focus)="captureUniOriginalValue()"
            (input)="dirty = true"
            (keydown.enter)="$any($event.target).blur()"
            (blur)="updateValue()"
            [required]="isTot"
        />
        <!-- Datalist levert browser-native autocomplete dropdown met bekende atomen -->
        <datalist [id]="'opts-uni-' + propertyName">
            <option *ngFor="let opt of options ?? []" [value]="opt"></option>
        </datalist>
    </div>
</ng-template>

<!-- Generieke lijst: elke CRUD-vlag bestuurt onafhankelijk één UI-element -->
<ng-template #list>
    <div *ngFor="let row of data; let i = index">
        <!-- U → minus: verborgen bij isTot als dit het laatste item is -->
        <ng-container
            *ngTemplateOutlet="
                removeButton;
                context: { $implicit: i, canRemove: canUpdate() && (!isTot || data.length > 1) }
            "
        >
        </ng-container>
        <!-- D → prullenbak: verborgen bij isTot als dit het laatste item is -->
        <ng-container
            *ngTemplateOutlet="
                deleteButton;
                context: { $implicit: i, showDelete: canDelete() && (!isTot || data.length > 1) }
            "
        >
        </ng-container>
        <!-- U → bewerkbaar tekstveld met autocomplete; anders platte tekst -->
        <input
            *ngIf="canUpdate()"
            type="text"
            #editInput
            [value]="row"
            [attr.list]="'opts-' + propertyName + '-' + i"
            (blur)="validateAndUpdate(row, editInput.value)"
            (keydown.enter)="$event.preventDefault(); validateAndUpdate(row, editInput.value)"
            style="padding-left: 9px"
        />
        <!-- Datalist levert browser-native autocomplete dropdown met bekende atomen -->
        <datalist *ngIf="canUpdate()" [id]="'opts-' + propertyName + '-' + i">
            <option *ngFor="let opt of options ?? []" [value]="opt"></option>
        </datalist>
        <span *ngIf="!canUpdate()" style="padding-left: 9px">{{ row }}</span>
    </div>
    <!-- C → add-input (maakt nieuw atom aan) -->
    <div *ngIf="canCreate()" class="p-inputgroup">
        <input
            type="text"
            class="min-w-10rem w-full"
            pInputText
            [(ngModel)]="newValue"
            [placeholder]="'Add value'"
            [required]="isTot && data.length === 0"
            (keyup.enter)="addValue()"
            [disabled]="isNewItemInputDisabled()"
        />
        <button
            type="button"
            pButton
            pRipple
            icon="pi pi-plus"
            styleClass="p-button-success"
            (click)="addValue()"
            [disabled]="isNewItemInputDisabled()"
        ></button>
    </div>
</ng-template>
