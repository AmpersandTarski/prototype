<div *ngFor="let object of data; let i = index" class="item">
    <div
        *ngIf="canUpdate()"
        class="pi pi-fw pi-minus"
        (click)="removeItem(i)"
        pTooltip="Remove"
        tooltipPosition="left"
    ></div>

    <div
        *ngIf="canDelete()"
        class="pi pi-fw pi-trash"
        (click)="deleteItem(i)"
        pTooltip="Delete"
        tooltipPosition="left"
    ></div>

    <span>
        {{ object._label_ }}
    </span>

    <app-ifcs-dropdown size="small" [resource]="object"></app-ifcs-dropdown>
</div>

<p-dropdown
    *ngIf="dropdownOptions"
    [options]="filteredDropdownOptions"
    [(ngModel)]="newValue"
    optionLabel="_label_"
    [filter]="true"
    filterBy="_label_"
    [showClear]="false"
    [placeholder]="placeholder"
    (onChange)="addValue()"
    [required]="isNewItemInputRequired()"
    [disabled]="isNewItemInputDisabled()"
>
    <ng-template pTemplate="filter">
        <div class="flex gap-1">
            <div class="p-inputgroup" (click)="$event.stopPropagation()">
                <span class="p-inputgroup-addon"><i class="pi pi-search"></i></span>
                <input
                    type="text"
                    pInputText
                    pAutoFocus
                    [autofocus]="true"
                    [style]="{ minWidth: '10rem' }"
                    [(ngModel)]="filterValue"
                    (keyup)="handleFilterInput($event)"
                />
                <span
                  class="p-inputgroup-addon"
                  [ngStyle]="{ cursor: filterValueIsValidToCreate() ? 'pointer' : 'default' }"
                  (click)="addFilterValue()"
                >
                    <i
                        class="pi pi-plus"
                        [ngStyle]="{ color: filterValueIsValidToCreate() ? 'green' : 'grey' }"
                    ></i>
                </span>
            </div>
        </div>
    </ng-template>
</p-dropdown>
