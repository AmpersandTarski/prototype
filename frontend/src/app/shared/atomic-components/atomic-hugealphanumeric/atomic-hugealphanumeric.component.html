<div *ngIf="canRead() && !canUpdate()">
    <ng-container *ngTemplateOutlet="cRud"> </ng-container>
</div>

<div *ngIf="canRead() && canUpdate() && isUni">
    <ng-container *ngTemplateOutlet="cRUdUni"> </ng-container>
</div>

<div *ngIf="canRead() && canUpdate() && !isUni">
    <ng-container *ngTemplateOutlet="cRUd"> </ng-container>
</div>

<div *ngIf="!canRead()">
    <ng-container *ngTemplateOutlet="crud"> </ng-container>
</div>

<ng-template #cRUdUni>
    <div class="w-full">
        <!-- Monaco code editor: line numbers, and the EditorService cursor target
             for clickable diagnostics. Commits on blur like the old textarea. -->
        <app-monaco-editor
            [value]="resource[propertyName] || ''"
            (valueChange)="onEditorChange($event)"
            (blurred)="onEditorBlur()"
        ></app-monaco-editor>
    </div>
</ng-template>

<ng-template #cRUd>
    <div *ngFor="let name of data; let i = index">
        <div
            class="pi pi-fw pi-minus"
            (click)="removeItem(i)"
            pTooltip="Remove"
            tooltipPosition="left"
            style="color: red; padding-bottom: 9px; cursor: pointer"
        ></div>

        <span style="padding-left: 9px">
            {{ name }}
        </span>
    </div>
    <div class="p-inputgroup">
        <textarea
            pInputTextarea
            class="min-w-10rem w-full"
            rows="20"
            [(ngModel)]="newValue"
            [placeholder]="'Add value'"
            [required]="isNewItemInputRequired()"
            [disabled]="isNewItemInputDisabled()"
        ></textarea>
        <button
            type="button"
            pButton
            pRipple
            icon="pi pi-plus"
            styleClass="p-button-success"
            (click)="addValue()"
            [disabled]="isNewItemInputDisabled()"
        ></button>
    </div>
</ng-template>

<ng-template #cRud>
    <!-- pre-wrap so multi-line text (e.g. compiler messages) keeps its line breaks -->
    <div *ngFor="let row of data" class="wordwrap" style="white-space: pre-wrap">{{ row }}</div>
</ng-template>

<ng-template #crud>
    <span><i>Hugealphanumeric is not readable</i></span>
</ng-template>
